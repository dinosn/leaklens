name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CGO_ENABLED: 0

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Set up Go
      uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Build pure-Go binary
      run: make build-pure

    - name: Run tests
      run: go test ./...

    - name: Run vet
      run: go vet ./...

    - name: Verify binary
      run: |
        test -x ./dist/leaklens
        ./dist/leaklens ver
        ./dist/leaklens --help >/dev/null
