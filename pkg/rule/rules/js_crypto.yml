rules:
  - name: Client-Side AES Key Candidate
    id: leaklens.js.crypto.1
    pattern: |
      (?x)(?i)
      \b
      (?:var|let|const)? \s* ["']?
      (?:
        (?P<key_name>g_ac)
        ["']?
        \s* (?:=|:) \s*
        ["']
        (?P<key>
          (?=[^\s"'\\]*[A-Za-z])
          (?=[^\s"'\\]*[0-9])
          (?:[^\s"'\\]{16}|[^\s"'\\]{24}|[^\s"'\\]{32})
        )
        ["']
      |
        (?:var|let|const) \s+
        (?P<minified_key_name>[A-Za-z_$][\w$]{0,2})
        \s* = \s*
        ["']
        (?P<minified_crypto_key>
          (?=[^\s"'\\]*[A-Za-z])
          (?=[^\s"'\\]*[0-9])
          (?:[^\s"'\\]{16}|[^\s"'\\]{24}|[^\s"'\\]{32})
        )
        ["']
        \s* ;? \s*
        if \s* \( \s* ! \s* \k<minified_key_name> \s* \|\| \s*
        (?:
          16 \s* !== \s* \k<minified_key_name> \. length
          |
          \k<minified_key_name> \. length \s* !== \s* 16
        )
        (?=[\s\S]{0,600}(?:AES|CryptoJS|enc\s*\.\s*Utf8|Utf8\s*\.\s*parse))
      |
        (?P<hex_crypto_key_name>
          encK(?:G|ey)?
          |
          encryptionKey
          |
          aesKey
          |
          cryptoKey
          |
          cipherKey
        )
        ["']?
        \s* (?:=|:) \s*
        ["']
        (?P<hex_crypto_key>
          (?:[A-Fa-f0-9]{32}|[A-Fa-f0-9]{48}|[A-Fa-f0-9]{64})
        )
        ["']
      |
        (?P<react_crypto_name>
          REACT_APP_(?:[A-Z0-9]+_)*(?:KEY|SECRET|PASSPHRASE)
        )
        ["']? \s* : \s* ["']
        (?P<react_crypto_passphrase>
          (?=[^\s"'\\]{12,128}["'])
          (?=[^\s"'\\]*[A-Za-z])
          (?=[^\s"'\\]*(?:[0-9]|[^A-Za-z0-9\s"'\\]))
          [^\s"'\\]{12,128}
        )
        ["']
        (?=
          [\s\S]{0,4096}
          (?P<react_crypto_alias>[A-Za-z_$][\w$]{0,63})
          \s* = \s*
          [A-Za-z_$][\w$]{0,63} \s* \. \s*
          \k<react_crypto_name> \b
          [\s\S]{0,1600}
          (?:[A-Za-z_$][\w$]{0,63} \s* \. \s*)?
          AES \s* \. \s* (?:encrypt|decrypt)
          \s* \( [^,;\r\n]{1,600} , \s* \k<react_crypto_alias> \b
        )
      |
        (?:[A-Za-z_$][\w$]{0,63} \s* \. \s*)?
        AES \s* \. \s* (?:encrypt|decrypt)
        \s* \( [^,;\r\n]{1,600} , \s*
        ["']
        (?P<inline_ecb_aes_passphrase>
          (?=[^\s"'\\]{8,128}["'])
          (?=[^\s"'\\]*[A-Za-z])
          (?=[^\s"'\\]*(?:[0-9]|[^A-Za-z0-9\s"'\\]))
          [^\s"'\\]{8,128}
        )
        ["'] \s* ,
        (?=
          [\s\S]{0,700}
          mode \s* : \s* [A-Za-z_$][\w$]{0,63} \s* \. \s* mode \s* \. \s* ECB
        )
        (?=
          [\s\S]{0,700}
          padding \s* : \s* [A-Za-z_$][\w$]{0,63} \s* \. \s* pad \s* \. \s* Pkcs7
        )
      |
        (?:[A-Za-z_$][\w$]{0,63} \s* \. \s*)?
        AES \s* \. \s* (?:encrypt|decrypt)
        \s* \( [^,;\r\n]{1,600} , \s*
        ["']
        (?P<inline_aes_passphrase>
          (?=[^\s"'\\]{12,128}["'])
          (?=[^\s"'\\]*[A-Za-z])
          (?=[^\s"'\\]*(?:[0-9]|[^A-Za-z0-9\s"'\\]))
          [^\s"'\\]{12,128}
        )
        ["'] \s* (?:,|\))
      |
        (?P<parsed_crypto_key_source>[A-Za-z_$][\w$]{0,63})
        \s* = \s*
        ["']
        (?P<parsed_crypto_key>
          (?=[^\s"'\\]{8,128}["'])
          (?=[^\s"'\\]*[A-Za-z])
          (?=[^\s"'\\]*(?:[0-9]|[^A-Za-z0-9\s"'\\]))
          [^\s"'\\]{8,128}
        )
        ["']
        (?=
          [\s\S]{0,2000}
          (?P<parsed_crypto_key_var>[A-Za-z_$][\w$]{0,63})
          \s* = \s*
          (?P<parsed_crypto_alias>[A-Za-z_$][\w$]{0,63})
          \s* \. \s* enc \s* \. \s* Utf8 \s* \. \s* parse
          \s* \( \s* \k<parsed_crypto_key_source> \s* \)
          [\s\S]{0,1600}
          \k<parsed_crypto_alias> \s* \. \s* AES \s* \. \s* (?:encrypt|decrypt)
          \s* \( [^,;\r\n]{1,700} , \s* \k<parsed_crypto_key_var> \b
          [\s\S]{0,700}
          \k<parsed_crypto_alias> \s* \. \s* (?:mode|pad) \s* \.
        )
      |
        function \s+ [A-Za-z_$][\w$]{0,63} \s*
        \(
          [^)]{0,600}?
          (?P<default_crypto_key_param>[A-Za-z_$][\w$]{0,63})
          \s* = \s*
          ["']
          (?P<default_crypto_key>
            (?=[^\s"'\\]{8,128}["'])
            (?=[^\s"'\\]*[A-Za-z])
            (?=[^\s"'\\]*(?:[0-9]|[^A-Za-z0-9\s"'\\]))
            [^\s"'\\]{8,128}
          )
          ["']
          [^)]{0,600}?
        \)
        (?=
          [\s\S]{0,2000}
          (?P<default_crypto_key_var>[A-Za-z_$][\w$]{0,63})
          \s* = \s*
          (?P<default_crypto_alias>[A-Za-z_$][\w$]{0,63})
          \s* \. \s* enc \s* \. \s* Utf8 \s* \. \s* parse
          \s* \( \s* \k<default_crypto_key_param> \s* \)
          [\s\S]{0,1600}
          \k<default_crypto_alias> \s* \. \s* AES \s* \. \s* (?:encrypt|decrypt)
          \s* \( [^,;\r\n]{1,700} , \s* \k<default_crypto_key_var> \b
          [\s\S]{0,700}
          \k<default_crypto_alias> \s* \. \s* (?:mode|pad) \s* \.
        )
      |
        (?P<pbkdf2_passphrase_name>
          passphrase
          |
          pass_phrase
          |
          password_phrase
          |
          secret_phrase
        )
        \s* (?:=|:) \s*
        ["']
        (?P<pbkdf2_passphrase>
          (?=[^"'\\\r\n]{8,128}["'])
          (?=[^"'\\\r\n]*[A-Za-z])
          (?=[^"'\\\r\n]*(?:[0-9]|[^A-Za-z0-9"'\\\r\n]))
          [^"'\\\r\n]{8,128}
        )
        ["']
        (?=
          [\s\S]{0,1600}
          (?P<pbkdf2_key_var>[A-Za-z_$][\w$]{0,63})
          \s* = \s*
          (?P<pbkdf2_crypto_alias>[A-Za-z_$][\w$]{0,63})
          \s* \. \s* PBKDF2
          \s* \( \s* \k<pbkdf2_passphrase_name> \b
          [\s\S]{0,2000}
          \k<pbkdf2_crypto_alias> \s* \. \s* AES \s* \. \s* encrypt
          \s* \( [^,;\r\n]{1,700} , \s* \k<pbkdf2_key_var> \b
        )
      |
        (?P<crypto_key_name>
          (?=[A-Za-z_$][\w$]*)(?=[\w$]*(?:aes|crypto|cipher)[\w$]*(?:key|secret|passphrase|token))[A-Za-z_$][\w$]*
          |
          (?=[A-Za-z_$][\w$]*)(?=[\w$]*(?:key|secret|passphrase|token)[\w$]*(?:aes|crypto|cipher))[A-Za-z_$][\w$]*
          |
          (?=[A-Za-z_$][\w$]*)(?=[\w$]*(?:secretkey|secret_key))[A-Za-z_$][\w$]*
        )
        ["']?
        \s* (?:=|:) \s*
        ["']
        (?P<crypto_key>
          (?=[^\s"'\\]*[A-Za-z])
          (?=[^\s"'\\]*[0-9])
          (?:[^\s"'\\]{16}|[^\s"'\\]{24}|[^\s"'\\]{32})
        )
        ["']
      )
    categories:
      - js
      - crypto
      - secret
      - fuzzy
    examples:
      - 'var g_ac = "A1bcdefghijklmno";'
      - 'var g_ac = "A1!bcdefghijklmn";'
      - 'const aesKey = "a1bcdefghijklmno";'
      - 'const secretKey = "a1bcdefghijklmno";'
      - 'const n="a1bcdefghijklmno";if(!n||16!==n.length)return console.error("AES key must be 16 bytes"),"";const r=CryptoJS.enc.Utf8.parse(n);'
      - '{"cryptoSecret": "a1bcdefghijklmno"}'
      - '{"EncKG": "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"}'
      - 'const env={REACT_APP_FORM_PASSPHRASE:"S7nthetic/passphrase"};const key=env.REACT_APP_FORM_PASSPHRASE;CryptoJS.AES.encrypt(payload,key);'
      - 'CryptoJS.AES.encrypt(payload,"S7nthetic/passphrase")'
      - 'crypto.AES.decrypt(ciphertext,"S7nthetic/passphrase")'
      - 'CryptoJS.AES.encrypt(password,"SyntK3y!",{mode:CryptoJS.mode.ECB,padding:CryptoJS.pad.Pkcs7})'
      - 'const a="SyntK3y!";function e(p){const k=c.enc.Utf8.parse(a);return c.AES.encrypt(p,k,{mode:c.mode.ECB,padding:c.pad.Pkcs7}).toString()}'
      - 'const a="S7nthetic/pass123";function e(p){const k=c.enc.Utf8.parse(a);return c.AES.encrypt(p,k,{mode:c.mode.ECB,padding:c.pad.Pkcs7}).toString()}'
      - 'const c=loadCrypto(),a="S7nthetic/pass123";function e(p){const k=c.enc.Utf8.parse(a);return c.AES.encrypt(p,k,{mode:c.mode.ECB,padding:c.pad.Pkcs7}).toString()}'
      - 'function e(p,a="S7nthetic/pass123"){const k=c.enc.Utf8.parse(a);return c.AES.decrypt(p,k,{mode:c.mode.ECB,padding:c.pad.Pkcs7}).toString(c.enc.Utf8)}'
      - 'const passPhrase="Synthet!c Pass";const key=CryptoJS.PBKDF2(passPhrase,CryptoJS.enc.Hex.parse(salt),{keySize:4,iterations:10000});const encrypted=CryptoJS.AES.encrypt(password,key,{iv:iv});'
    negative_examples:
      - 'var g_ac = "abcdefghijklmnop";'
      - 'var displayName = "A1!bcdefghijklmn";'
      - 'const aesKey = "short";'
      - 'const accessKey = "a1bcdefghijklmno";'
      - 'const n="a1bcdefghijklmno";if(!n||16!==n.length)return "";return n.toLowerCase();'
      - '{"Iv": "0123456789abcdef0123456789abcdef"}'
      - 'const env={REACT_APP_PUBLIC_WIDGET_KEY:"PublicClient42Value"};render(env.REACT_APP_PUBLIC_WIDGET_KEY);'
      - 'const env={REACT_APP_FORM_PASSPHRASE:"S7nthetic/passphrase"};send(env.REACT_APP_FORM_PASSPHRASE);'
      - 'CryptoJS.AES.encrypt(payload,"short1!")'
      - 'CryptoJS.AES.encrypt(payload,"short1!",{mode:CryptoJS.mode.CBC,padding:CryptoJS.pad.Pkcs7})'
      - 'CryptoJS.AES.encrypt(payload,runtimeKey,{label:"S7nthetic/passphrase"})'
      - 'const a="S7nthetic/pass123";function e(p){const iv=c.enc.Utf8.parse(a);return c.AES.encrypt(p,runtimeKey,{iv:iv,mode:c.mode.CBC,padding:c.pad.Pkcs7}).toString()}'
      - 'function e(p,a="S7nthetic/pass123"){const iv=c.enc.Utf8.parse(a);return c.AES.decrypt(p,runtimeKey,{iv:iv,mode:c.mode.CBC,padding:c.pad.Pkcs7}).toString(c.enc.Utf8)}'
      - 'const consultaEstablecimientosDesplegableServicio_v1_URI = "/v1/establecimientos/desplegable";'
      - 'const passPhrase="Synthet!c Pass";send(passPhrase);'
      - 'const iv="0123456789abcdef0123456789abcdef";const key=CryptoJS.PBKDF2(runtimePass,CryptoJS.enc.Hex.parse(iv),{keySize:4});CryptoJS.AES.encrypt(password,key,{iv:ivWord});'
    description: >
      A client-side cryptographic key or passphrase candidate was found in
      JavaScript. The detector covers semantic AES/crypto/cipher key names,
      quoted hex-encoded AES key properties, narrow minified AES length-guard
      patterns, React configuration values proven to flow into an AES call,
      literal AES key/passphrase arguments, CryptoJS Utf8-parsed passphrases
      and PBKDF2-derived passphrases proven to flow into AES, and the observed g_ac convention
      while avoiding generic key and string matches.
  - name: Client-Side AES Password Encryption Flow
    id: leaklens.js.crypto.2
    pattern: |
      (?x)(?i)
      \b
      (?:
        function \s+
        (?P<aes_password_encryptor>[A-Za-z_$][\w$]{0,63})
        \s* \(
          \s* (?P<aes_password_param>[A-Za-z_$][\w$]{0,63})
          (?: \s* , [^)]{0,400} )?
        \) \s* \{
        (?=
          [\s\S]{0,2800}
          (?P<aes_password_key_var>[A-Za-z_$][\w$]{0,63})
          \s* = \s*
          (?P<aes_password_alias>[A-Za-z_$][\w$]{0,63})
          \s* \. \s* enc \s* \. \s* Utf8 \s* \. \s* parse
          \s* \(
        )
        (?=
          [\s\S]{0,5200}
          \k<aes_password_alias> \s* \. \s* AES \s* \. \s* encrypt
          \s* \( [^,;\r\n]{1,900} , \s* \k<aes_password_key_var> (?![\w$])
        )
        (?=
          [\s\S]{0,5200}
          \k<aes_password_alias> \s* \. \s* AES \s* \. \s* encrypt
          \s* \( [^,;\r\n]{1,900} , \s* \k<aes_password_key_var> (?![\w$])
          [\s\S]{0,2200}
          mode \s* : \s* \k<aes_password_alias> \s* \. \s* mode \s* \. \s* ECB
        )
        (?=
          [\s\S]{0,5200}
          \k<aes_password_alias> \s* \. \s* AES \s* \. \s* encrypt
          \s* \( [^,;\r\n]{1,900} , \s* \k<aes_password_key_var> (?![\w$])
          [\s\S]{0,2200}
          padding \s* : \s* \k<aes_password_alias> \s* \. \s* pad \s* \. \s* Pkcs7
        )
        [\s\S]{0,24000}?
        \k<aes_password_encryptor> \s* \( \s*
        (?P<aes_password_input>
          (?: [A-Za-z_$][\w$]{0,63} \s* \. \s* )?
          (?:
            oldPassword
            |
            newPassword
            |
            currentPassword
            |
            confirmPassword
            |
            password
            |
            passwd
            |
            pwd
          )
        ) \b
      |
        (?P<aes_password_encryptor_arrow>[A-Za-z_$][\w$]{0,63})
        \s* = \s*
        (?: \( \s* )?
        (?P<aes_password_param_arrow>[A-Za-z_$][\w$]{0,63})
        (?: \s* \) )?
        \s* => \s* \{
        (?=
          [\s\S]{0,2800}
          (?P<aes_password_key_var_arrow>[A-Za-z_$][\w$]{0,63})
          \s* = \s*
          (?P<aes_password_alias_arrow>[A-Za-z_$][\w$]{0,63})
          \s* \. \s* enc \s* \. \s* Utf8 \s* \. \s* parse
          \s* \(
        )
        (?=
          [\s\S]{0,5200}
          \k<aes_password_alias_arrow> \s* \. \s* AES \s* \. \s* encrypt
          \s* \( [^,;\r\n]{1,900} , \s* \k<aes_password_key_var_arrow> (?![\w$])
        )
        (?=
          [\s\S]{0,5200}
          \k<aes_password_alias_arrow> \s* \. \s* AES \s* \. \s* encrypt
          \s* \( [^,;\r\n]{1,900} , \s* \k<aes_password_key_var_arrow> (?![\w$])
          [\s\S]{0,2200}
          mode \s* : \s* \k<aes_password_alias_arrow> \s* \. \s* mode \s* \. \s* ECB
        )
        (?=
          [\s\S]{0,5200}
          \k<aes_password_alias_arrow> \s* \. \s* AES \s* \. \s* encrypt
          \s* \( [^,;\r\n]{1,900} , \s* \k<aes_password_key_var_arrow> (?![\w$])
          [\s\S]{0,2200}
          padding \s* : \s* \k<aes_password_alias_arrow> \s* \. \s* pad \s* \. \s* Pkcs7
        )
        [\s\S]{0,24000}?
        \k<aes_password_encryptor_arrow> \s* \( \s*
        (?P<aes_password_input_arrow>
          (?: [A-Za-z_$][\w$]{0,63} \s* \. \s* )?
          (?:
            oldPassword
            |
            newPassword
            |
            currentPassword
            |
            confirmPassword
            |
            password
            |
            passwd
            |
            pwd
          )
        ) \b
      )
    categories:
      - js
      - crypto
      - appsec
      - fuzzy
    examples:
      - 'function bR(n){const e=CryptoJS.enc.Utf8.parse(k);return CryptoJS.AES.encrypt(n,e,{mode:CryptoJS.mode.ECB,padding:CryptoJS.pad.Pkcs7}).toString()}form={oldPassword:bR(values.oldPassword),newPassword:bR(values.newPassword)};'
      - 'function seal(v){const e=c.enc.Utf8.parse(secret);return c.AES.encrypt(v,e,{mode:c.mode.ECB,padding:c.pad.Pkcs7}).toString()}request.password=seal(request.password);'
      - 'const enc=p=>{const k=c.enc.Utf8.parse(secret);return c.AES.encrypt(p,k,{mode:c.mode.ECB,padding:c.pad.Pkcs7}).toString()};payload.pwd=enc(payload.pwd);'
    negative_examples:
      - 'function bR(n){return encodeURIComponent(n)}form={oldPassword:bR(values.oldPassword)};'
      - 'function bR(n){const e=CryptoJS.enc.Utf8.parse(k);return CryptoJS.AES.encrypt(n,e,{mode:CryptoJS.mode.CBC,padding:CryptoJS.pad.Pkcs7}).toString()}form={oldPassword:bR(values.oldPassword)};'
      - 'function bR(n){const e=CryptoJS.enc.Utf8.parse(k);return CryptoJS.AES.encrypt(n,e,{mode:CryptoJS.mode.ECB,padding:CryptoJS.pad.Pkcs7}).toString()}form={token:bR(values.token)};'
    description: >
      Browser-side JavaScript encrypts password-named input through an AES
      ECB/PKCS7 wrapper. This is reported as an application security review
      signal because the protection depends on client-delivered code and should
      be validated server-side rather than treated as a replacement for TLS or
      normal authentication controls.
