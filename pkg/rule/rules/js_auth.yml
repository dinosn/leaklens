rules:
  - name: JavaScript Client Secret Literal
    id: leaklens.js.client-secret.1
    pattern: |-
      (?i)["']?\b(?P<secret_name>client[_-]?secret)\b["']?\s*(?::=|=>|=|:)\s*["'](?P<client_secret>[a-z0-9][a-z0-9._~+/\-]{10,254}[a-z0-9]={0,2})["']

    categories: [js, secret, fuzzy, generic]

    examples:
      - 'const config = {clientId: "web_portal", clientSecret: "Q7vN2mX9pR4sL8kD6wT3"};'
      - 'const CLIENT_SECRET = "Z8rM3pQ6vN1xK5dF7hJ2";'
      - '{"client-secret":"M4kP8vR2sN6xQ9dL3wT7"}'

    negative_examples:
      - 'const config = {clientSecret: runtime.clientSecret};'
      - 'const config = {clientSecret: "YOUR_CLIENT_SECRET_123456"};'
      - 'const config = {clientSecret: "abcdefghijklmnopqrst"};'
      - 'const clientSecretLabel = "Application client secret";'

    description: >
      A credential-like literal is assigned to a JavaScript client-secret
      property. Browser-delivered client secrets cannot remain confidential and
      should be replaced with a server-side token exchange or a public-client
      authorization flow.

  - name: Client-Side Basic Authentication Credential Flow
    id: leaklens.js.basic-auth-flow.1
    pattern: |-
      (?i)(?:["']Authorization["']|(?:[a-z_$][\w$]*\s*\.\s*){0,4}Authorization)\s*(?::|=)\s*["']Basic\s+["']\s*\+\s*(?P<base64_encoder>(?:[a-z_$][\w$]*\s*\.\s*){0,6}(?:Base64\s*\.\s*encode|btoa))\s*\(\s*(?P<client_id_ref>(?:[a-z_$][\w$]*\s*\.\s*){0,6}client[_-]?id)\s*\+\s*["']:["']\s*\+\s*(?P<client_secret_ref>(?:[a-z_$][\w$]*\s*\.\s*){0,6}client[_-]?secret)\s*\)

    categories: [js, secret, fuzzy, generic]

    examples:
      - >-
        {"Authorization":"Basic "+App.lib.Base64.encode(App.Config.clientId+":"+App.Config.clientSecret)}
      - >-
        headers.Authorization = "Basic " + window.btoa(config.client_id + ":" + config.client_secret)

    negative_examples:
      - >-
        const encoded = App.lib.Base64.encode(App.Config.clientId+":"+App.Config.clientSecret)
      - >-
        {"Authorization":"Bearer "+token}
      - >-
        {"Authorization":"Basic "+App.lib.Base64.encode(username+":"+password)}

    description: >
      Browser JavaScript constructs an HTTP Basic Authorization value from a
      client identifier and client secret. Base64 encoding is reversible and
      does not protect credentials delivered to an unauthenticated client.
